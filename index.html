<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="F1" class="Flex">
        <div id="h1" class="upperFlex">F1</div>
        <div id="h2" class="upperFlex">F2</div>
        <div id="h3" class="upperFlex">F3</div>
    </header>

    <div class="content-wrapper">
        
        <aside id="F3" class="SidebarFlex">
            <div id="s1" class="MiddleFlex">FM1</div>
            <div id="s2" class="MiddleFlex">FM2</div>
            <div id="s3" class="MiddleFlex">FM3</div>
            <div id="s4" class="MiddleFlex">FM4</div>
        </aside>

        <main id="G1" class="Grid">
            <div id="g1" class="GridItem">G1</div>
            <div id="g2" class="GridItem">G2</div>
        </main>

    </div>

    <footer id="F2" class="Flex">
        <div id="f1" class="lowerFlex">FF1</div>
        <div id="f2" class="lowerFlex">FF2</div>
        <div id="f3" class="lowerFlex">FF3</div>
    </footer>

</body>
</html>
